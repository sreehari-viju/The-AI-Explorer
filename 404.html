<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | The AI Explorer</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.webp">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Base Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }
        .error-message {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-bottom"></div>

    <header>
        <nav>
            <a href="index.html" class="logo" aria-label="Go to Homepage"><img src="assets/images/logo.webp" alt="The AI Explorer Logo" class="nav-logo"> The AI Explorer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="error-section">
            <div class="error-code gradient-text">404</div>
            <h1 class="animate-on-scroll">Signal Lost</h1>
            <p class="error-message animate-on-scroll">
                The node you are looking for does not exist or has been moved. Let's get you back to the main grid.
            </p>
            <a href="index.html" class="btn btn-primary animate-on-scroll" aria-label="Return to homepage">Return to Home</a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
