        <section class="contact-section">
            <h1 class="animate-on-scroll">Get In Touch</h1>
            <p class="section-subtitle animate-on-scroll">Interested in AI, IoT, or Robotics? Feel free to reach out!</p>
            
            <div class="contact-card animate-on-scroll">
                <a href="mailto:sreehariviju.rpi@gmail.com" class="contact-link" id="email-link" aria-label="Send an email to Sreehari">
                    <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>

                </a>
                
                <a href="https://github.com/Sreehari-rpi" target="_blank" class="contact-link github" aria-label="Visit Sreehari's GitHub Profile">
                    <svg class="icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path></svg>

    <script src="script.js"></script>
    <script>
        const email = "sreehariviju.rpi@gmail.com";
        const emailBtn = document.getElementById('email-link');
        
        emailBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Prevent mailto default behavior
            
            // Copy to clipboard
            navigator.clipboard.writeText(email).then(() => {
                // Visual feedback
                const originalText = emailBtn.innerHTML;
                emailBtn.innerHTML = `<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg> Copied to Clipboard!`;
                
                // Reset after 3 seconds
                setTimeout(() => {
                    emailBtn.innerHTML = originalText;
                }, 3000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                // Fallback to mailto if copy fails
                window.location.href = "mailto:" + email;
            });
        });
    </script>
